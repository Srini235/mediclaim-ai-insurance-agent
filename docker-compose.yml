# One-command full stack for the Predictive-Maintenance app — Group 105.
#
#   docker compose up --build
#
# Frontend -> http://localhost:5173      Backend/API -> http://localhost:8000/docs
services:
  backend:
    build: .
    container_name: hydraulics_api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: hydraulics_web
    ports:
      - "5173:80"
    depends_on:
      - backend
